<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLife</title>
    <link rel="icon" href="/static/img/logo_petLife_aba.png" type="image/png">
    <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>
    <div class="container">
        <form action="/login_exe" method="post">
            <img class="logo" src="../static/img/logo_petLife.png" alt="">
            <h1>Boas vindas ao Pet<b>Life</b></h1>
            <p>Faça o login na sua conta</p>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="E-mail" required>

            <label for="email">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Senha" required>

        <button type="submit">Entrar</button>
        <a href="/register" style="margin-top: 1rem; display: flex; justify-content: center;">Ainda não tem uma conta?</a>

        {% if flash %}
        <div class="msg-box {{ 'msg-erro' if flash.tipo == 'erro' else 'msg-sucesso' }}">
            <h2>{{ flash.header }}</h2>
            <p>{{ flash.texto }}</p>
        </div>
        {% endif %}
        </form>
    <img class="imagem_pets" src="../static/img/login_cat_dog.png" alt="">
    </div>
</body>
</html>
