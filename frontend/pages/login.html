<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLife</title>
    <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>
    <div class="container">
        <form>
            <img class="logo" src="../static/img/logo_petLife.png" alt="">
            <h1>Boas vindas ao Pet<b>Life</b></h1>
            <p>Faça o login na sua conta</p>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="E-mail" required>

            <label for="email">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Senha" required>

        <button type="submit">Cadastrar</button>
        <a href="../pages/register.html">Ainda não tem uma conta?</a>
    </form>
    <img class="imagem_pets" src="../static/img/login_cat_dog.png" alt="">
    </div>
</body>
</html>
