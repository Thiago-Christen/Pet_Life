<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}PetLife{% endblock %}</title>

    <link rel="icon" href="{{ request.url_for('static', path='../static/img/logo_petLife_aba.png') }}" type="image/png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS principal -->
    <link rel="stylesheet" href="{{ request.url_for('static', path='../static/css/style.css') }}">

    <link rel = "stylesheet" href = "{{ request.url_for('static', path='../static/css/dicas.css') }}" >  

    <link rel = "stylesheet" href = "{{ request.url_for('static', path='../static/css/profile.css') }}" >  

</head>

<body>
    {% block content %}{% endblock %}

    <!-- JS Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ request.url_for('static', path='js/profile.js') }}"></script>
    <script src="{{ request.url_for('static', path='js/profile_validate.js') }}"></script>
</body>

</html>
