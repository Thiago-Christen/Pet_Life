<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLife</title>
    <link rel="icon" href="/static/img/icone.ico" type="image/png">
    <link rel="stylesheet" href="../static/css/register.css">
</head>
<body>
    <div class="container">
        <form id="registerForm" action="/register_exe" method="post" novalidate>
            <img class="logo" src="../static/img/logo_petLife.png" alt="Logo PetLife">

            <h1>Crie sua conta</h1>
            <p>Cadastre-se para cuidar do seu Pet com todo carinho</p>

            {% if flash %}
                <div class="msg-box {{ 'msg-erro' if flash.tipo == 'erro' else 'msg-sucesso' }}">
                    <h2>{{ flash.header }}</h2>
                    <p>{{ flash.texto }}</p>
                </div>
            {% endif %}

            <div class="fields">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" name="nome" placeholder="Nome completo">
                <small class="error" id="nameError"></small>
            </div>

            <div class="fields">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="E-mail">
                <small class="error" id="emailError"></small>
            </div>

            <div class="fields">
                <label for="phone">Celular</label>
                <input type="tel" id="phone" name="phone" placeholder="(xx) xxxxx-xxxx" maxlength="15">
                <small class="error" id="phoneError"></small>
            </div>

            <div class="fields">
                <label for="birthdate">Data de Nascimento</label>
                <input type="date" id="birthdate" name="birthdate">
                <small class="error" id="birthdateError"></small>
            </div>

            <div class="fields">
                <label for="cpfCnpj">CPF</label>
                <input type="text" id="cpfCnpj" name="cpfCnpj" placeholder="CPF">
                <small class="error" id="cpfCnpjError"></small>
            </div>

            <div class="fields">
                <label for="password">Senha</label>
                <div class="password-box">
                    <input type="password" id="password" name="password" placeholder="Senha">
                    <button type="button" id="togglePassword">Mostrar</button>
                </div>
                <small class="error" id="passwordError"></small>
            </div>

            <div class="fields">
                <label for="confirmPassword">Confirme sua senha</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirme sua senha">
                <small class="error" id="confirmPasswordError"></small>
            </div>

            <button type="submit">Cadastrar</button>

            <a href="/login" class="link">Já tem uma conta?</a>
        </form>

        <img class="imagem_pets" src="../static/img/login_cat_dog.png" alt="Pets">
    </div>

    <script src="../static/js/register.js"></script>
</body>

</html>
